version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: ats_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ats_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ats_password}
      POSTGRES_DB: ${DB_NAME:-ats_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ats_user} -d ${DB_NAME:-ats_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ats_network

  # 后端 API 服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ats_server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-ats_user}:${DB_PASSWORD:-ats_password}@postgres:5432/${DB_NAME:-ats_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - ats_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PC 前端构建
  client-build:
    image: node:20-alpine
    container_name: ats_client_build
    working_dir: /app
    volumes:
      - ./client:/app
      - client_dist:/app/dist
    command: >
      sh -c "npm install && npm run build"
    networks:
      - ats_network
    profiles:
      - build

  # 移动端构建
  mobile-build:
    image: node:20-alpine
    container_name: ats_mobile_build
    working_dir: /app
    volumes:
      - ./mobile:/app
      - mobile_dist:/app/dist
    command: >
      sh -c "npm install && npm run build"
    networks:
      - ats_network
    profiles:
      - build

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: ats_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - client_dist:/usr/share/nginx/html:ro
      - mobile_dist:/usr/share/nginx/html/mobile:ro
      - ./server/uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - server
    networks:
      - ats_network

volumes:
  postgres_data:
  client_dist:
  mobile_dist:

networks:
  ats_network:
    driver: bridge
